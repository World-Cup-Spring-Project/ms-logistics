# Profile 'local' - desenvolvimento na maquina do desenvolvedor.
# Conectando na infraestrutura geral do WorldCupSpringProject
spring:
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5433/arenacup_db}
    username: ${POSTGRES_USER:arenacup_user}
    password: ${POSTGRES_PASSWORD:arenacup_password}
    hikari:
      maximum-pool-size: 10
  flyway:
    enabled: true
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ms-logistics
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "br.com.infnet.mslogistics.infra.kafka.events"
    producer:
      acks: all
      properties:
        enable.idempotence: true

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

logging:
  level:
    root: INFO
    br.com.infnet.mslogistics: DEBUG
    org.springframework.kafka: INFO

management:
  endpoint:
    health:
      validate-group-membership: false